<div>
  <h4 id="secRoleDeleteHeading">Confirm delete operation</h4>
  <p>Are you sure you want to delete this role with id {{ secRole?.id }}?</p>
  <div class="mt-3 d-flex justify-content-end">
    <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    <button type="button" class="btn btn-danger ms-2" (click)="confirmDelete(secRole!.id)">Delete</button>
  </div>
</div>
